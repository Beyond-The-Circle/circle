<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beyond The Circle</title>

  <!-- Google Fonts: Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ─── NOISE OVERLAY ─── -->
  <div class="noise"></div>

  <!-- ─── PAGE WRAPPER ─── -->
  <div class="page-wrapper">

    <!-- ─── HERO / MAIN FEATURED CARD ─── -->
<header class="hero-card">
  <div class="hero-bg-grid"></div>
  <img src="Images/logo.png" class="hero-bg-logo" alt="" />
  <div class="hero-content">
    <span class="hero-eyebrow">EST. MMXXV</span>
    <h1 class="hero-title">Beyond<br><em>The Circle</em></h1>
    <p class="hero-tagline">A Discord unit specially made for creators, editors, artist to socialize and collab with each other..</p>

    <div class="hero-buttons">
      <a href="https://discord.gg/YOURLINK" target="_blank" class="hero-btn hero-btn--discord">Discord</a>
      <a href="https://www.youtube.com/channel/UCI9yS7y82obfZwlJOzmJh8A" target="_blank" class="hero-btn hero-btn--youtube">YouTube</a>
      <a href="https://instagram.com/YOURHANDLE" target="_blank" class="hero-btn hero-btn--instagram">Instagram</a>
    </div>
  </div>
  <div class="hero-orb hero-orb--1"></div>
  <div class="hero-orb hero-orb--2"></div>
</header>
    <!-- ─── SECTION LABEL ─── -->
    <div class="section-label">
      <span class="section-label__line"></span>
      <span class="section-label__text">Circle Members</span>
      <span class="section-label__line"></span>
    </div>

    <!-- ─── PROFILES GRID ─── (populated by script.js) -->
    <main class="profiles-grid" id="profilesGrid" aria-label="Profile grid"></main>

  </div><!-- /page-wrapper -->

  <!-- ─── MODAL ─── -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalName" hidden>
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose" aria-label="Close modal">✕</button>

      <!-- Banner -->
      <div class="modal-banner" id="modalBanner">
        <div class="modal-avatar-wrap">
          <img class="modal-avatar" id="modalAvatar" src="" alt="" />
        </div>
        <div class="modal-banner-text">
          <h2 class="modal-name" id="modalName"></h2>
          <p class="modal-bio" id="modalBio"></p>
        </div>
        <div class="modal-banner-orb"></div>
      </div>

      <!-- Link Buttons -->
      <div class="modal-links" id="modalLinks"></div>
    </div>
  </div>

  
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
